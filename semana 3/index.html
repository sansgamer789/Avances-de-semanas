<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo Grid</title>

    <!-- Enlazamos el archivo CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Contenedor principal GRID -->
    <div class="container">

        <!-- Header ocupa las 3 columnas -->
        <header class="header">
            HEADER
        </header>

        <!-- Sidebar ocupa 1 columna y 2 filas -->
        <aside class="sidebar">
            SIDEBAR
        </aside>

        <!-- Main ocupa 2 columnas y 2 filas -->
        <main class="main">
            MAIN CONTENT
        </main>

        <!-- Footer ocupa las 3 columnas -->
        <footer class="footer">
            FOOTER
        </footer>

    </div>

</body>
</html>
