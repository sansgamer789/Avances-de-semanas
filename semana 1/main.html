<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración de caracteres -->
    <meta charset="UTF-8">

    <!-- Adaptación a celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Página Responsiva</title>

    <style>
        /* Estilo del cuerpo */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f0f0f0;
        }

        /* Encabezado */
        header {
            background-color: blue;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Contenido */
        .contenido {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        /* Cajas */
        .caja {
            background-color: white;
            padding: 20px;
            width: 200px;
            text-align: center;
            border: 1px solid gray;
        }

        /* Diseño para celular */
        @media (max-width: 600px) {
            .contenido {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <!-- Título principal -->
    <header>
        <h1>Mi Página</h1>
    </header>

    <!-- Contenido principal -->
    <div class="contenido">

        <div class="caja">
            <h2>Opción 1</h2>
            <p>Texto de ejemplo.</p>
        </div>

        <div class="caja">
            <h2>Opción 2</h2>
            <p>Texto de ejemplo.</p>
        </div>

    </div>

</body>
</html>
